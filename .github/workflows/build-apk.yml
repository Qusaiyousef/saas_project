name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # يسمح لك بتشغيل البناء يدوياً من واجهة جيتهاب

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Flutter 3.22+ requires Java 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        working-directory: ./saas_frontend
        run: flutter pub get

      - name: Build APK (Split Per ABI)
        working-directory: ./saas_frontend
        run: flutter build apk --split-per-abi

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: saas-app-arm64
          path: saas_frontend/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: saas-app-arm32
          path: saas_frontend/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
